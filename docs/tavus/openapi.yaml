                      replicas that have been created by users. System replicas
                      are stock Tavus replicas that anyone may use
                  model_name:
                    type: string
                    example: phoenix-3
                    description: >-
                      The Phoenix model the replica was trained on (e.g.
                      `phoenix-3`, `phoenix-4`).
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: The error message.
                    example: Invalid replica_id
        '401':
          description: UNAUTHORIZED
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: The error message.
                    example: Invalid access token
      security:
        - apiKey: []
